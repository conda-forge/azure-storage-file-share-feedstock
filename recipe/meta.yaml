{% set name = "azure-storage-file-share" %}
{% set version = "12.25.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/azure_storage_file_share-{{ version }}.tar.gz
  sha256: 4953be0eb39c4c871432d2d94238213659d140c0ee055f75ca1af11de467fd80

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - azure-core >=1.30.0
    - cryptography >=2.1.4
    - typing_extensions >=4.6.0
    - isodate >=0.6.1

test:
  imports:
    - azure.storage.fileshare
    - azure.storage.fileshare._generated
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/storage/azure-storage-file-share
  summary: Microsoft Azure Azure File Share Storage Client Library for Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - davidbrochart
    - rxm7706
